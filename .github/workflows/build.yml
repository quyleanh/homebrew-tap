name: Build Bottles

on:
  # Trigger manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild all packages (skip version check)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Run automatically every Sunday at 2:00 AM UTC
  schedule:
    - cron: "0 2 * * 0"

  # Run when packages.txt is changed
  push:
    paths:
      - "packages.txt"
    branches:
      - main

permissions:
  contents: write  # Required to commit formula updates and manage releases

jobs:
  build:
    name: Build Bottles (macOS 15 / Intel x86_64)
    runs-on: macos-15-intel

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Homebrew env
        run: |
          echo "HOMEBREW_NO_AUTO_UPDATE=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_INSTALL_CLEANUP=1" >> $GITHUB_ENV

      - name: Update Homebrew
        run: brew update --quiet

      - name: Install dependencies
        run: |
          brew install bash jq  # bash 5+ and jq required by build scripts

      - name: Make scripts executable
        run: |
          chmod +x scripts/build.sh
          chmod +x scripts/update_formula.sh

      - name: Build bottles
        id: build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ github.workspace }}/bottles
          FORCE_BUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_build || 'false' }}
        run: /usr/local/bin/bash scripts/build.sh

      - name: List built bottles
        run: |
          echo "=== Built bottles ==="
          ls -lh bottles/ 2>/dev/null || echo "No new bottles built"

      - name: Upload bottles to release
        if: steps.build.outputs.BUILT_COUNT != '0'
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: stable
          name: "Stable Bottles"
          body: |
            Auto-built Homebrew bottles for macOS Ventura (13) on Intel x86_64.
            Built on `macos-15-intel` runner.
            Last updated: run #${{ github.run_number }}
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: false
          files: bottles/*.bottle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update formula files
        if: steps.build.outputs.BUILT_COUNT != '0'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          BOTTLES_DIR: ${{ github.workspace }}/bottles
        run: ./scripts/update_formula.sh

      - name: Commit updated formulas
        if: steps.build.outputs.BUILT_COUNT != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/
          git add packages_resolved.txt

          if git diff --staged --quiet; then
            echo "No formula changes to commit."
          else
            git commit -m "chore: update bottles [skip ci]

          Built by GitHub Actions run #${{ github.run_number }}
          Runner: macos-15-intel (Sequoia, Intel x86_64)"
            git push
          fi

      - name: Summary
        run: |
          built=${{ steps.build.outputs.BUILT_COUNT || '0' }}
          failed=${{ steps.build.outputs.FAILED_COUNT || '0' }}

          if [ "$built" = "0" ] && [ "$failed" = "0" ]; then
            echo "## ⏭️ All packages up to date" >> $GITHUB_STEP_SUMMARY
            echo "No new versions found — nothing to build." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            for f in bottles/*.bottle.tar.gz; do
              [ -f "$f" ] || continue
              size=$(du -h "$f" | cut -f1)
              echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
            done
          fi