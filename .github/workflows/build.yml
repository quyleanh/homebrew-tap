name: Build Bottles

on:
  # Trigger manually from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force rebuild all packages (skip version check)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

  # Run automatically every 12 hours
  schedule:
    - cron: '13 4,16 * * *'

  # Run when packages.txt, scripts, or this workflow file are changed
  push:
    paths:
      - "packages.txt"
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MACOSX_DEPLOYMENT_TARGET: "12.0"  # Target Monterey (12.0) and above

permissions:
  contents: write  # Required to commit formula updates and manage releases

jobs:
  build:
    name: Build Bottles (macOS Intel / Multi-OS 12+)
    runs-on: macos-15-intel

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Homebrew env
        run: |
          echo "HOMEBREW_NO_AUTO_UPDATE=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_INSTALL_CLEANUP=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1" >> $GITHUB_ENV
          echo "HOMEBREW_NO_ENV_HINTS=1" >> $GITHUB_ENV

      - name: Update Homebrew
        run: brew update --quiet

      - name: Install dependencies
        run: |
          brew install bash jq  # bash 5+ and jq required by build scripts

      - name: Build bottles
        id: build
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTPUT_DIR: ${{ github.workspace }}/bottles
          FORCE_BUILD: ${{ inputs.force_build || 'false' }}
        run: /usr/local/bin/bash scripts/build.sh

      - name: List built bottles
        run: |
          echo "=== Built bottles ==="
          ls -lh bottles/ 2>/dev/null || echo "No new bottles built"

      - name: Upload bottles to release
        if: steps.build.outputs.BUILT_COUNT != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit stable \
            --title "Stable Bottles" \
            --notes "Auto-built Homebrew bottles for Intel x86_64. Native support for Monterey (12), Ventura (13), Sonoma (14), and Sequoia (15). Built on macos-15-intel runner with deployment target 12.0. Last updated: run #${{ github.run_number }}"
          gh release upload stable bottles/*.tar.gz bottles/*.json --clobber

      - name: Update formula files
        if: steps.build.outputs.BUILT_COUNT != '0'
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          BOTTLES_DIR: ${{ github.workspace }}/bottles
        run: ./scripts/update_formula.sh

      - name: Commit updated formulas
        if: steps.build.outputs.BUILT_COUNT != '0'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/
          git add packages_resolved.txt

          if git diff --staged --quiet; then
            echo "No formula changes to commit."
          else
            git commit -m "chore: update bottles [skip ci]

          Built by GitHub Actions run #${{ github.run_number }}
          Runner: macos-15-intel (Sequoia, Intel x86_64)"
            git pull --rebase
            git push
          fi

      - name: Cleanup orphaned assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: /usr/local/bin/bash scripts/cleanup_release.sh

      - name: Summary
        run: |
          built=${{ steps.build.outputs.BUILT_COUNT || '0' }}
          failed=${{ steps.build.outputs.FAILED_COUNT || '0' }}

          if [ "$built" = "0" ] && [ "$failed" = "0" ]; then
            echo "## ⏭️ All packages up to date" >> $GITHUB_STEP_SUMMARY
            echo "No new versions found — nothing to build." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            for f in bottles/*.tar.gz; do
              [ -f "$f" ] || continue
              size=$(du -h "$f" | cut -f1)
              echo "| $(basename $f) | $size |" >> $GITHUB_STEP_SUMMARY
            done
          fi
